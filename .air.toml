# Air - Live reload for Go apps
# https://github.com/cosmtrek/air

root = "."
tmp_dir = "tmp"

[build]
# Command to build your application
cmd = "go build -o ./tmp/main ./cmd/auth-service"

# Binary file yields from `cmd`
bin = "tmp/main"

# Customize binary run command
full_bin = "APP_ENV=development ./tmp/main"

# Watch these filename extensions
include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]

# Ignore these filename extensions or directories
exclude_dir = ["assets", "tmp", "vendor", "node_modules", "docs", "deployments", "test"]

# Watch these directories if you're specific
include_dir = ["cmd", "internal", "pkg", "configs"]

# Exclude files
exclude_file = []

# Exclude specific regular expressions
exclude_regex = ["_test\\.go$", "_gen\\.go$"]

# Exclude unchanged files
exclude_unchanged = true

# Follow symlinks
follow_symlink = true

# This log file places in your tmp_dir
log = "tmp/air.log"

# Poll files for changes instead of using fsnotify
poll = false

# Poll interval (defaults to the minimum interval of 500ms)
poll_interval = 500

# Add delay so that changes are not triggered too frequently
delay = 1000

# Stop running old binary when build errors occur
stop_on_error = true

# Send Interrupt signal before killing process (windows does not support this)
send_interrupt = true

# Delay after sending Interrupt signal
kill_delay = 500

# Rerun binary or not
rerun = false

# Delay after each rerun
rerun_delay = 500

# Add additional arguments when running binary
args_bin = []

[log]
# Show log time
time = true

# Only show main log (silences watcher, build, runner)
main_only = false

[color]
# Customize each part's color. If no color found, use the raw app log.
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true

[screen]
# Clear screen on program restart
clear_on_rebuild = true
