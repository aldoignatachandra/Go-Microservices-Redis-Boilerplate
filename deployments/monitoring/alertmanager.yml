# Alertmanager configuration
global:
  resolve_timeout: 5m
  # SMTP configuration for email alerts
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@example.com'
  smtp_require_tls: false

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route configuration
route:
  # Default receiver
  receiver: 'default'

  # Group alerts
  group_by: ['alertname', 'cluster', 'service']

  # Wait time before sending notification
  group_wait: 10s

  # Wait time before sending notification about new alerts in a group
  group_interval: 10s

  # Wait time before re-sending notification
  repeat_interval: 12h

  # Child routes
  routes:
    # Critical alerts
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 5m

    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning'
      group_wait: 30s
      repeat_interval: 1h

    # Backend team alerts
    - match:
        team: backend
      receiver: 'backend-team'

    # Ops team alerts
    - match:
        team: ops
      receiver: 'ops-team'

    # Security alerts
    - match:
        team: security
      receiver: 'security-team'
      group_wait: 0s
      repeat_interval: 5m

# Receivers configuration
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'

  - name: 'critical'
    webhook_configs:
      - url: 'http://localhost:5001/critical'
    email_configs:
      - to: 'oncall@example.com'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'

  - name: 'warning'
    webhook_configs:
      - url: 'http://localhost:5001/warning'

  - name: 'backend-team'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#backend-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'ops-team'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#ops-alerts'

  - name: 'security-team'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#security-alerts'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'

# Inhibition rules
inhibit_rules:
  # Inhibit warning if critical is firing for the same alert
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Inhibit service down alert if high error rate is also firing
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'CriticalErrorRate'
    equal: ['job']
