apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: microservices
data:
  # Application
  APP_ENV: "production"
  APP_VERSION: "1.0.0"

  # Server
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "3100"
  SERVER_READ_TIMEOUT: "10s"
  SERVER_WRITE_TIMEOUT: "10s"
  SERVER_SHUTDOWN_TIMEOUT: "10s"

  # Database
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_SSLMODE: "disable"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "5"
  DB_CONN_MAX_LIFETIME: "5m"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"

  # Redis Streams
  STREAMS_MAX_LEN: "10000"
  STREAMS_BLOCK_MS: "5000"
  STREAMS_BATCH_SIZE: "10"

  # Auth
  JWT_EXPIRES_IN: "24h"
  JWT_REFRESH_EXPIRES_IN: "168h"
  BCRYPT_COST: "12"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_DURATION: "1m"

  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

  # Metrics
  METRICS_ENABLED: "true"
  METRICS_PATH: "/metrics"

  # Tracing
  TRACING_ENABLED: "false"
  TRACING_ENDPOINT: "http://otel-collector:4317"

  # Services
  USER_SERVICE_URL: "http://user-service:3101"
  PRODUCT_SERVICE_URL: "http://product-service:3102"
