apiVersion: v1
kind: Secret
metadata:
  name: microservices-secrets
  namespace: microservices
type: Opaque
stringData:
  # Database credentials
  DB_USER: "postgres"
  DB_PASSWORD: "change-me-in-production"
  DB_NAME: "auth_db"

  # Redis password (if required)
  REDIS_PASSWORD: ""

  # JWT secret (MUST be changed in production!)
  JWT_SECRET: "change-me-in-production-use-a-secure-random-string"

  # Database URLs for each service
  AUTH_DB_URL: "postgresql://postgres:change-me-in-production@postgres-service:5432/auth_db?sslmode=disable"
  USER_DB_URL: "postgresql://postgres:change-me-in-production@postgres-service:5432/user_db?sslmode=disable"
  PRODUCT_DB_URL: "postgresql://postgres:change-me-in-production@postgres-service:5432/product_db?sslmode=disable"
---
# Note: In production, use external secret management like:
# - Kubernetes External Secrets Operator
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - GCP Secret Manager
