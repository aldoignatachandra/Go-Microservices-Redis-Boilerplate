basePath: /
definitions:
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: seconds
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.DeleteResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.PaginationMeta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - ADMIN
        - USER
        type: string
    required:
    - email
    - password
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RestoreResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      user:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserListResponse:
    properties:
      pagination:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.PaginationMeta'
      users:
        items:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
        type: array
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_pkg_utils.ErrorBody:
    properties:
      code:
        type: string
      details:
        type: string
      message:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_pkg_utils.Meta:
    properties:
      request_id:
        type: string
      timestamp:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_pkg_utils.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.ErrorBody'
      meta:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Meta'
      success:
        type: boolean
    type: object
  pkg_server.HealthResponse:
    properties:
      checks:
        additionalProperties:
          type: string
        type: object
      service:
        type: string
      status:
        type: string
      timestamp:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
host: localhost:3100
info:
  contact:
    name: API Support
    url: https://github.com/aldoignatachandra/Go-Microservices-Redis-Boilerplate
  description: Authentication service for Go Microservices Redis Pub/Sub Boilerplate.
    Provides user registration, login, JWT token management, and admin user operations.
  title: Auth Service API
  version: "1.0"
paths:
  /admin/health:
    get:
      description: Detailed health with dependency status (requires system auth)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_server.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/pkg_server.HealthResponse'
      security:
      - SystemAuth: []
      summary: Admin health check
      tags:
      - health
  /admin/users:
    get:
      description: List all users with pagination (admin only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by role
        enum:
        - ADMIN
        - USER
        in: query
        name: role
        type: string
      - description: Search by email
        in: query
        name: search
        type: string
      - description: Include deleted users
        in: query
        name: include_deleted
        type: boolean
      - description: Only deleted users
        in: query
        name: only_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - admin
  /admin/users/{id}:
    delete:
      description: Delete a user (soft delete by default) (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Force hard delete
        in: query
        name: force
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.DeleteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - admin
    get:
      description: Get a specific user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Include deleted users
        in: query
        name: include_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - admin
  /admin/users/{id}/restore:
    post:
      description: Restore a soft-deleted user (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RestoreResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Restore user
      tags:
      - admin
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the current user's password
      parameters:
      - description: Password change data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Logout user and invalidate session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Get the currently authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: Refresh token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: Register a new user
      tags:
      - auth
  /health:
    get:
      description: Returns 200 if service is running (for load balancers)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_server.HealthResponse'
      summary: Public health check
      tags:
      - health
  /live:
    get:
      description: Returns 200 if service is alive
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Liveness probe
      tags:
      - health
  /ready:
    get:
      description: Returns 200 if service is ready to accept traffic
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Readiness probe
      tags:
      - health
  /started:
    get:
      description: Returns 200 if service has started
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Startup probe
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: 'Enter your bearer token in the format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
