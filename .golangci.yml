# golangci-lint configuration - Production Standard
# Based on best practices from Uber, Google, and other major tech companies
# https://golangci-lint.run/usage/configuration/

run:
  # Timeout for analysis
  timeout: 5m

  # Include test files
  tests: true

  # List of build tags
  build-tags: []

  # Go version to target
  go: "1.23"

# Output configuration
output:
  # Print linter name in the end of issue text
  print-linter-name: true

  # Sort results by: filepath, line and column
  sort-results: true

# Linters configuration
linters:
  # Default linters are too permissive, start from none
  default: none

  enable:
    # Essential linters
    - gofmt          # Code formatting
    - goimports      # Import ordering and formatting
    - govet          # Go's built-in vet

    # Bug detection
    - errcheck       # Check for unchecked errors
    - staticcheck    # Go static analysis
    - ineffassign    # Detect ineffective assignments
    - typecheck      # Type checking
    - unused         # Detect unused code

    # Code simplification
    - gosimple       # Simplify code
    - prealloc       # Suggest preallocation for slices

    # Style and quality
    - misspell       # Fix spelling mistakes
    - gocritic       # Opinionated code quality checks
    - revive         # Fast, configurable linter
    - stylecheck     # Style checks
    - unconvert      # Remove unnecessary type conversions
    - unparam        # Remove unused function parameters
    - nakedret       # Detect naked returns
    - noctx          # Check for HTTP requests without context

    # Security
    - gosec          # Security checker
    - bodyclose      # Check HTTP response bodies are closed

    # Performance
    - copyloopvar    # Check for loop variable copying issues (Go 1.22+)

    # Additional checks
    - nilerr         # Find errors that are not nil-checked
    - dupl           # Detect duplicate code
    - goconst        # Find repeated strings that could be replaced by constants
    - gocyclo        # Compute cycl complexities
    - durationcheck  # Check for duration calculation issues

  disable:
    # Disabled due to high false positive rate or project-specific needs
    - exhaustive     # Too strict for enum checking
    - err113         # Errors should not be compared with plain strings
    - lll            # Long line checker (too strict)
    - wsl            # Whitespace linter (conflicts with other formatters)
    - gci            # Import ordering (we use goimports instead)
    - godot          # Comment formatting (not required)
    - whitespace     # Whitespace linter (gofmt handles this)
    - funlen         # Function length checker (too strict)
    - nestif         # Nested if checker (too strict)
    - testpackage    # Test package naming (project-specific)

# Linter settings
linters-settings:
  govet:
    # Enable all analyzers
    enable-all: true
    # Disable specific analyzers that are too noisy
    disable:
      - shadow     # Shadow variables are sometimes intentional

  errcheck:
    # Report about errors in all assignments
    check-type-assertions: false
    # Report about errors in calls to fmt.Print*
    check-blank: false

  staticcheck:
    # Select which checks to run
    checks: ["all", "-SA1019"]  # Exclude SA1019 (deprecation warnings)
    # SA1019: Staticcheck deprecated warnings are too noisy

  gosec:
    # Select which rules to run
    includes:
      - G101  # Look for hard coded credentials
      - G102  # Bind to all interfaces
      - G103  # Audit the use of ssh.InsecureIgnoreHostKey
      - G104  # Audit errors not checked
      - G106  # Audit the use of ssh.InsecureIgnoreHostKey
      - G107  # Url provided to HTTP request as query param
      - G201  # SQL query construction
      - G202  # Use of weak crypto
      - G203  # Use of weak crypto
      - G204  # Audit use of exec
      - G301  # Poor file permissions used when creating a directory
      - G302  # Poor file permissions used with chmod
      - G303  # Creating tempfile using a predictable path
      - G304  # File path provided as an argument to a function
      - G305  # File traversal when extracting zip archive
      - G306  # Poor file permissions used when writing to a new file
      - G307  # Deferring a method which returns an error
      - G401  # Detect the usage of DES, RC4, MD5 or SHA1
      - G402  # Look for bad TLS connection modes
      - G403  # Ensure minimum TLS version
      - G404  # Insecure random number source rand
      - G501  # Import blocklist
      - G502  # Import blocklist
      - G503  # Import blocklist
      - G504  # Import blocklist
      - G505  # Import blocklist
      - G601  # Implicit memory aliasing of items from a range statement
      - G602  # Locally disable value/pointer addressing checks

    # Exclude some files/directories from security checks
    exclude-dirs:
      - test/

  revive:
    # Set confidence level (0.0 - 1.0)
    confidence: 0.8

    # Rules configuration
    rules:
      - name: blank-imports
        severity: error

      - name: context-as-argument
        severity: error

      - name: context-keys-type
        severity: warning
        disabled: false

      - name: dot-imports
        severity: error

      - name: error-return
        severity: error

      - name: error-strings
        severity: warning

      - name: error-naming
        severity: warning

      - name: exported
        severity: warning
        arguments:
          - checkPrivateReceivers
          - sayRepetitiveInsteadOfStutters

      - name: if-return
        severity: warning

      - name: increment-decrement
        severity: error

      - name: var-naming
        severity: warning

      - name: var-declaration
        severity: warning

      - name: package-comments
        severity: warning

      - name: range
        severity: warning

      - name: receiver-naming
        severity: warning

      - name: time-naming
        severity: warning

      - name: unexported-return
        severity: error

      - name: indent-error-flow
        severity: warning

      - name: errorf
        severity: warning

      - name: empty-block
        severity: warning

      - name: superfluous-else
        severity: warning

      - name: unused-parameter
        severity: warning

      - name: unreachable-code
        severity: error

      - name: redefines-builtin-id
        severity: error

      # Disabled rules
      - name: import-shadowing
        disabled: true

      - name: unused-receiver
        disabled: true

      - name: confusing-naming
        disabled: true

      # Disable exported rule in pkg/metrics to avoid function name repetition warning
      # The metrics.MetricsMiddleware name is intentional and clear

  gocritic:
    # Enable all tags
    enable-all: true

    # Disable specific checks
    disabled-checks:
      - dupImport         # Handled by goimports
      - ifElseChain      # Sometimes necessary for clarity
      - octalLiteral     # Octal is sometimes needed
      - whyNoLint        # Ignore whyNoLint
      - wrapperFunc     # Wrapper functions are fine
      - unnamedResult   # Unnamed results are sometimes fine
      - hugeParam        # Pass by value is fine for small structs
      - paramTypeCombine  # Combined parameters are fine
      - commentFormatting  # Comment formatting is flexible
      - importShadow     # Import shadowing is fine

  gocyclo:
    # Minimum complexity to report
    min-complexity: 15

  dupl:
    # Threshold for duplicate code
    threshold: 100

  goconst:
    # Minimum length of constant string
    min-len: 3
    # Minimum occurrences of constant string
    min-occurrences: 3

  misspell:
    # Correct spellings using locale
    locale: US

  prealloc:
    # Report preallocation suggestions only on simple loops
    simple: true
    range-loops: true
    for-loops: false

  stylecheck:
    # Select which checks to run
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
    # ST1000: Incorrect or missing package comment
    # ST1003: Poor names used in exported function names
    # ST1016: Methods on the same type should have the same receiver name
    # ST1020: Exported function names should not be redundant
    # ST1021: Exported type names should not be redundant
    # ST1022: Exported constants should have a comment (or be prefixed)

  nilerr:
    # Check for explicitly ignored nil errors
    checked: false

# Issues configuration
issues:
  # Don't use default exclude patterns
  exclude-use-default: false

  # Maximum issues count per linter
  max-issues-per-linter: 0

  # Maximum count of issues with the same text
  max-same-issues: 0

  # Show only new issues
  new: false

  # Fix found issues (if supported by the linter)
  fix: false

  # Make issues output unique by line
  uniq-by-line: true

  # Which dirs to skip
  exclude-dirs:
    - vendor
    - test/integration
    - test/e2e
    - deployments
    - docs
    - scripts
    - .git

  # Which files to skip
  exclude-files:
    - ".*_gen\\.go$"
    - ".*_mock\\.go$"
    - ".*_wire\\.go$"

  # Exclude rules
  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        - prealloc
        - nilerr
        - noctx       # Tests often use simple HTTP requests
        - gocritic    # Tests have different patterns
        - unused      # Unused parameters in test helpers are acceptable
        - revive      # Test code has different conventions
        - staticcheck # Test code patterns differ from production
        - unparam     # Unused parameters in test helpers are acceptable

    # Exclude fieldalignment from test files (test structs don't need optimization)
    - path: _test\.go
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude fieldalignment from domain files (memory optimization, not critical)
    - path: .*/domain/
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude fieldalignment from dto files (memory optimization, not critical)
    - path: .*/dto/
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude fieldalignment from usecase files (memory optimization, not critical)
    - path: .*/usecase/
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude fieldalignment from common package (memory optimization, not critical)
    - path: internal/common/
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude fieldalignment from pkg/config (memory optimization, not critical)
    - path: pkg/config/
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude fieldalignment from pkg/ (memory optimization, not critical)
    - path: pkg/
      linters:
        - govet
      text: "fieldalignment:"

    # Exclude dupl from repository files (FindByID vs FindByEmail are similar but different purposes)
    - path: internal/.*/repository/
      linters:
        - dupl

    # Exclude dupl from handler files (GET vs DELETE have similar patterns but different purposes)
    - path: internal/.*/delivery/handler\.go
      linters:
        - dupl

    # Exclude specific linters from generated code
    - path: internal/domain/
      linters:
        - revive

    # Exclude revive from mocks (auto-generated)
    - path: .*/mocks/
      linters:
        - revive

    # Exclude revive from _mock.go files
    - path: _mock\.go
      linters:
        - revive

    # Exclude revive exported rule in pkg/metrics to avoid function name repetition warning
    - path: pkg/metrics/
      linters:
        - revive
      text: "exported: func name will be used as"

    # Exclude specific revive rules from pkg/ (minor style issues)
    - path: pkg/
      linters:
        - revive
      text: "context-as-argument:"

    - path: pkg/
      linters:
        - revive
      text: "exported: comment on exported"

    - path: pkg/
      linters:
        - revive
      text: "type name will be used as"

    - path: pkg/
      linters:
        - revive
      text: "exported method"

    - path: pkg/
      linters:
        - revive
      text: "redefines-builtin-id:"

    - path: pkg/
      linters:
        - revive
      text: "context-keys-type:"

    # Exclude unused-parameter from pkg/ (intentional parameters for interfaces/error handlers)
    - path: pkg/
      linters:
        - revive
      text: "unused-parameter:"

    # Exclude G404 from pkg/resilience (weak random is acceptable for retry jitter)
    - path: pkg/resilience/
      linters:
        - gosec
      text: "G404:"

    # Exclude errcheck from pkg/server (cleanup errors are acceptable to ignore)
    - path: pkg/server/
      linters:
        - errcheck
      text: "Close"

    # Exclude gosec G104 from pkg/server (cleanup errors are acceptable to ignore)
    - path: pkg/server/
      linters:
        - gosec
      text: "G104:"

    # Exclude gocritic builtinShadow from pkg/ (acceptable parameter names)
    - path: pkg/
      linters:
        - gocritic
      text: "builtinShadow:"

    # Exclude staticcheck SA1029 from pkg/ (string context keys are acceptable)
    - path: pkg/
      linters:
        - staticcheck
      text: "SA1029:"

    # Exclude SA1019 (deprecation warnings)
    - linters:
        - staticcheck
      text: "SA1019:"

    # Exclude SA4010 (append result never used) - acceptable in tests
    - path: _test\.go
      linters:
        - staticcheck
      text: "SA4010:"
