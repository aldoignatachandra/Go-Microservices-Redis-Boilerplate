        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: Delete user
      tags:
      - users
    get:
      description: Get a user by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Include deleted users
        in: query
        name: include_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: Get user by ID
      tags:
      - users
  /api/v1/users/{id}/activate:
    post:
      description: Activate a user account
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
