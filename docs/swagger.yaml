    type: object
host: localhost:3100
info:
  contact:
    name: API Support
    url: https://github.com/aldoignatachandra/Go-Microservices-Redis-Boilerplate
  description: Authentication service for Go Microservices Redis Pub/Sub Boilerplate.
    Provides user registration, login, JWT token management, and admin user operations.
  title: Auth Service API
  version: "1.0"
paths:
  /admin/health:
    get:
      description: Detailed health with dependency status (requires system auth)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/server.HealthResponse'
      security:
      - SystemAuth: []
      summary: Admin health check
      tags:
      - health
  /admin/users:
    get:
      description: List all users with pagination (admin only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by role
        enum:
        - ADMIN
        - USER
        in: query
        name: role
        type: string
      - description: Search by email
        in: query
        name: search
        type: string
      - description: Include deleted users
        in: query
        name: include_deleted
        type: boolean
      - description: Only deleted users
        in: query
        name: only_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - admin
  /admin/users/{id}:
    delete:
      description: Delete a user (soft delete by default) (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Force hard delete
        in: query
        name: force
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.DeleteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - admin
    get:
      description: Get a specific user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Include deleted users
        in: query
        name: include_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - admin
  /admin/users/{id}/restore:
    post:
      description: Restore a soft-deleted user (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RestoreResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Restore user
      tags:
      - admin
  /api/v1/activity-logs:
    get:
      description: Get activity logs with optional filtering
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Filter by resource
        in: query
        name: resource
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.ActivityLogListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: Get activity logs
      tags:
      - users
  /api/v1/users:
    get:
      description: Get a paginated list of users
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Search by email or name
        in: query
        name: search
        type: string
      - description: Include deleted users
        in: query
        name: include_deleted
        type: boolean
      - description: Only show deleted users
        in: query
        name: only_deleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.UserListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_pkg_utils.Response'
      summary: List users
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      description: Soft delete a user account
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.MessageResponse'
        "400":
