basePath: /
definitions:
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: seconds
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.DeleteResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.PaginationMeta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - ADMIN
        - USER
        type: string
    required:
    - email
    - password
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.RestoreResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      user:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserListResponse:
    properties:
      pagination:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.PaginationMeta'
      users:
        items:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse'
        type: array
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_auth_dto.UserResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.CreateProductRequest:
    properties:
      category_id:
        type: string
      description:
        maxLength: 1000
        type: string
      name:
        maxLength: 255
        minLength: 3
        type: string
      price:
        type: number
      stock:
        type: integer
    required:
    - category_id
    - name
    - price
    - stock
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.DeleteResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.ProductListResponse:
    properties:
      limit:
        type: integer
      page:
        type: integer
      products:
        items:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_product_dto.ProductResponse'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.ProductResponse:
    properties:
      category_id:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      price:
        type: number
      status:
        type: string
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.UpdateProductRequest:
    properties:
      description:
        maxLength: 1000
        type: string
      name:
        maxLength: 255
        minLength: 3
        type: string
      price:
        type: number
      status:
        enum:
        - ACTIVE
        - INACTIVE
        type: string
      stock:
        type: integer
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.UpdateStockRequest:
    properties:
      id:
        type: string
      stock:
        type: integer
    required:
    - id
    - stock
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_product_dto.UpdateStockResponse:
    properties:
      message:
        type: string
      stock:
        type: integer
      success:
        type: boolean
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.ActivityLogListResponse:
    properties:
      logs:
        items:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.ActivityLogResponse'
        type: array
      pagination:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.PaginationMeta'
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.ActivityLogResponse:
    properties:
      action:
        type: string
      created_at:
        type: string
      id:
        type: string
      ip_address:
        type: string
      metadata:
        additionalProperties: true
        type: object
      resource:
        type: string
      resource_id:
        type: string
      user_agent:
        type: string
      user_id:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.MessageResponse:
    properties:
      message:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.PaginationMeta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.ProfileResponse:
    properties:
      avatar:
        type: string
      bio:
        type: string
      first_name:
        type: string
      full_name:
        type: string
      id:
        type: string
      last_name:
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.RestoreResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      user:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.UserResponse'
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.UpdateProfileRequest:
    properties:
      avatar:
        type: string
      bio:
        maxLength: 500
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.UserListResponse:
    properties:
      pagination:
        $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.PaginationMeta'
      users:
        items:
          $ref: '#/definitions/github_com_ignata_go-microservices-boilerplate_internal_user_dto.UserResponse'
        type: array
    type: object
  github_com_ignata_go-microservices-boilerplate_internal_user_dto.UserResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      profile:
