# Production Environment Configuration
# All secrets should be provided via environment variables

app:
  name: "auth-service"
  version: "1.0.0"
  env: "production"

server:
  host: "0.0.0.0"
  port: 3100
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "60s"

database:
  host: "${DB_HOST}"
  port: 5432
  name: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  sslmode: "require"
  max_open_conns: 100
  max_idle_conns: 25
  conn_max_lifetime: "15m"

redis:
  host: "${REDIS_HOST}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 50

streams:
  max_len: 500000
  block_ms: 5000
  batch_size: 100
  consumer_group: "auth-service"
  consumer_name: "${HOSTNAME}"

auth:
  jwt:
    secret: "${JWT_SECRET}"
    expires_in: "1h"
    refresh_expires_in: "72h"
  bcrypt:
    cost: 14

rate_limit:
  enabled: true
  requests: 1000
  duration: "1m"

logging:
  level: "warn"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

tracing:
  enabled: true
  endpoint: "${OTEL_ENDPOINT}"

services:
  user_service: "${USER_SERVICE_URL}"
  product_service: "${PRODUCT_SERVICE_URL}"
