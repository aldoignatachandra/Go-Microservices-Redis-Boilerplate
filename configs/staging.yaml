# Staging Environment Configuration
# Mirrors production with relaxed settings for testing

app:
  name: "auth-service"
  version: "1.0.0"
  env: "staging"

server:
  host: "0.0.0.0"
  port: 3100
  read_timeout: "15s"
  write_timeout: "15s"
  shutdown_timeout: "30s"

database:
  host: "${DB_HOST}"
  port: 5432
  name: "${DB_NAME}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  sslmode: "require"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "10m"

redis:
  host: "${REDIS_HOST}"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 20

streams:
  max_len: 100000
  block_ms: 5000
  batch_size: 50
  consumer_group: "auth-service"
  consumer_name: "${HOSTNAME}"

auth:
  jwt:
    secret: "${JWT_SECRET}"
    expires_in: "12h"
    refresh_expires_in: "168h"
  bcrypt:
    cost: 12

rate_limit:
  enabled: true
  requests: 500
  duration: "1m"

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

tracing:
  enabled: true
  endpoint: "${OTEL_ENDPOINT}"

services:
  user_service: "${USER_SERVICE_URL}"
  product_service: "${PRODUCT_SERVICE_URL}"
