# Development Environment Configuration
# Used for shared development environments

app:
  name: "auth-service"
  version: "1.0.0"
  env: "development"

server:
  host: "0.0.0.0"
  port: 3100
  read_timeout: "15s"
  write_timeout: "15s"
  shutdown_timeout: "15s"

database:
  host: "postgres-dev"
  port: 5432
  name: "auth_db"
  user: "postgres"
  password: "postgres-dev-password"
  sslmode: "disable"
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: "10m"

redis:
  host: "redis-dev"
  port: 6379
  password: ""
  db: 0
  pool_size: 20

streams:
  max_len: 50000
  block_ms: 5000
  batch_size: 20
  consumer_group: "auth-service"
  consumer_name: "auth-dev-1"

auth:
  jwt:
    secret: "${JWT_SECRET}"
    expires_in: "12h"
    refresh_expires_in: "168h"
  bcrypt:
    cost: 12

rate_limit:
  enabled: true
  requests: 200
  duration: "1m"

logging:
  level: "debug"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"

tracing:
  enabled: true
  endpoint: "http://jaeger:4317"

services:
  user_service: "http://user-service:3101"
  product_service: "http://product-service:3102"
